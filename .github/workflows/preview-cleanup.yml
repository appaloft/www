name: Preview Cleanup

on:
  workflow_dispatch:
    inputs:
      preview_id:
        description: Preview id to clean, for example pr-5
        required: true
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    concurrency:
      group: appaloft-www-preview-remote-state
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    env:
      APPALOFT_CLI_VERSION: latest
      PREVIEW_ID: ${{ inputs.preview_id }}
      PREVIEW_ENVIRONMENT: preview-${{ inputs.preview_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Appaloft
        uses: appaloft/setup-appaloft@v1
        with:
          version: ${{ env.APPALOFT_CLI_VERSION }}

      - name: Prepare SSH key
        shell: bash
        run: |
          key_path="${RUNNER_TEMP}/appaloft-preview-ssh-key"
          umask 077
          printf '%s\n' "$APPALOFT_SSH_PRIVATE_KEY" >"$key_path"
          echo "APPALOFT_SSH_PRIVATE_KEY_FILE=$key_path" >>"$GITHUB_ENV"
        env:
          APPALOFT_SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}

      - name: Cleanup preview
        shell: bash
        run: |
          appaloft preview cleanup . \
            --server-host "${{ vars.APPALOFT_SSH_HOST }}" \
            --server-ssh-username "${{ vars.APPALOFT_SSH_USER }}" \
            --server-ssh-private-key-file "$APPALOFT_SSH_PRIVATE_KEY_FILE" \
            --state-backend ssh-pglite \
            --preview pull-request \
            --preview-id "$PREVIEW_ID"

      - name: Delete GitHub preview deployments
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          deployment_ids="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/deployments?environment=${PREVIEW_ENVIRONMENT}&per_page=100" --jq '.[].id')"
          if [[ -z "$deployment_ids" ]]; then
            exit 0
          fi

          while IFS= read -r deployment_id; do
            [[ -n "$deployment_id" ]] || continue
            gh api "repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}" \
              --method DELETE \
              -H "Accept: application/vnd.github+json"
          done <<<"$deployment_ids"

      - name: Delete GitHub preview environment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/environments/${PREVIEW_ENVIRONMENT}" >/dev/null 2>&1; then
            gh api "repos/${GITHUB_REPOSITORY}/environments/${PREVIEW_ENVIRONMENT}" \
              --method DELETE \
              -H "Accept: application/vnd.github+json"
          fi
