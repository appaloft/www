runtime:
  strategy: workspace-commands
  installCommand: bun install --frozen-lockfile
  buildCommand: bun run build
  startCommand: bun ./dist/server/entry.mjs
  healthCheckPath: /

network:
  internalPort: 4321
  upstreamProtocol: http
  exposureMode: reverse-proxy

env:
  HOST: 0.0.0.0
  PORT: "4321"
  APPALOFT_BETTER_AUTH_COOKIE_DOMAIN: .preview.appaloft.com
  APPALOFT_BETTER_AUTH_TRUSTED_PROXY_HEADERS: "true"
  APPALOFT_LOCALE_COOKIE_DOMAIN: .preview.appaloft.com

secrets:
  APPALOFT_BETTER_AUTH_SECRET:
    from: ci-env:APPALOFT_BETTER_AUTH_SECRET
    required: true
